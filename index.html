<script>

function exportPDF(){
  document.querySelector('.share-bar').style.display='none';
  document.querySelector('.capture-box').style.display='none';
  window.print();
  setTimeout(()=>{
    document.querySelector('.share-bar').style.display='flex';
    document.querySelector('.capture-box').style.display='block';
  },1000);
}
function shareReddit(){
  const txt = encodeURIComponent('I calculated my real net income as a Greek freelancer in 2026: only '+grNet+'€ left after ΕΦΚΑ');
  const url = encodeURIComponent(window.location.href);
  window.open('https://www.reddit.com/submit?title='+txt+'&url='+url,'_blank');
}
function shareTwitter(){
  const txt = encodeURIComponent('I calculated my real net income as a Greek freelancer in 2026: only '+grNet+'€ left after ΕΦΚΑ'+' '+window.location.href);
  window.open('https://twitter.com/intent/tweet?text='+txt,'_blank');
}
function submitEmail(e){
  e.preventDefault();
  const email = document.getElementById('cap_email').value;
  if(!email) return;
  const form  = new FormData();
  form.append('email', email);
  form.append('source', 'greece-freelance-efka');
  form.append('result', grNet || 'N/A');
  fetch('https://formspree.io/f/xpwzpwzp',{
    method:'POST', body:form,
    headers:{'Accept':'application/json'}
  }).then(()=>{
    document.getElementById('cap_email').value='';
    document.getElementById('cap_thanks').style.display='block';
  }).catch(()=>{});
  return false;
}


var grNet = 0;
function calcGR(){
  const income  = parseFloat(document.getElementById('income').value)||0;
  const years   = parseInt(document.getElementById('years').value)||1;
  const vat     = document.getElementById('vat').value==='yes';
  const EFKA_RATE = years <= 5 ? 0.155 : 0.264;
  const efka  = income * EFKA_RATE;
  const vatAmt= vat ? income * 0.24 : 0;
  const taxable= income - efka;
  let tax = 0;
  if(taxable <= 10000)       tax = 0;
  else if(taxable <= 20000)  tax = (taxable-10000)*0.22;
  else if(taxable <= 30000)  tax = 2200+(taxable-20000)*0.28;
  else if(taxable <= 40000)  tax = 5000+(taxable-30000)*0.36;
  else                       tax = 8600+(taxable-40000)*0.44;
  const solidarity = taxable > 12000 ? taxable*0.022 : 0;
  const totalTax = tax + solidarity;
  const net = income - efka - totalTax;
  grNet = Math.round(net);
  const eff = income > 0 ? ((efka+totalTax)/income*100).toFixed(1) : '0';
  document.getElementById('res_efka').textContent = efka.toFixed(0)+'€';
  document.getElementById('res_tax').textContent  = totalTax.toFixed(0)+'€';
  document.getElementById('res_net').textContent  = net.toFixed(0)+'€';
  document.getElementById('res_eff').textContent  = eff+'%';
  document.getElementById('res_vat').textContent  = vat ? vatAmt.toFixed(0)+'€ (must remit)' : 'Exempt (<10k€)';
  const shock = document.getElementById('shock_gr');
  shock.style.display='block';
  const keep = income > 0 ? (net/income*100).toFixed(0) : 0;
  shock.className = 'shock '+(keep<50?'shock-red':keep<65?'shock-orange':'shock-green');
  shock.innerHTML = 'You keep <strong>'+keep+'%</strong> of what you invoice — '
    +(keep<50?'very heavy Greek tax load':'manageable with optimization');
  document.getElementById('aff_box').style.display = 'block';
  document.getElementById('capture_section').style.display = 'block';
}

window.onload = calcGR;
</script>
